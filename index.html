<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Para mi amor 💜</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Poppins', sans-serif;
  background: radial-gradient(circle at top, #2b0033, #000);
  color:white;
  overflow-x:hidden;
}

/* INTRO */
#intro{
  position:fixed;
  width:100%;
  height:100%;
  background: radial-gradient(circle, #1a001f, #000);
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  z-index:999;
}

#startBtn{
  padding:15px 30px;
  background:#ff4d88;
  border:none;
  border-radius:30px;
  color:white;
  font-size:1.2em;
  cursor:pointer;
}

/* BOTÓN PLAY (backup) */
#playBtn{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#ff4d88;
  border:none;
  border-radius:50%;
  width:60px;
  height:60px;
  font-size:20px;
  color:white;
  cursor:pointer;
}

/* CORAZONES */
.heart-rain{
  position:fixed;
  top:-10px;
  animation: fall linear forwards;
}

@keyframes fall{
  to{ transform:translateY(110vh); }
}

header{
  text-align:center;
  padding:100px 20px;
}
</style>
</head>

<body>

<!-- INTRO -->
<div id="intro">
  <h1>💜 Para ti, mi amor 💜</h1>
  <button id="startBtn">Entrar 💖</button>
</div>

<!-- AUDIO -->
<audio id="music" preload="auto">
  <source src="./music.mp3" type="audio/mpeg">
</audio>

<!-- BOTÓN PLAY MANUAL -->
<button id="playBtn">🎵</button>

<header>
  <h1>💜 Feliz 3 Meses 💜</h1>
</header>

<script>
const btn = document.getElementById("startBtn");
const intro = document.getElementById("intro");
const music = document.getElementById("music");
const playBtn = document.getElementById("playBtn");

// CLICK ENTRAR
btn.onclick = async ()=>{
  intro.style.display = "none";

  try {
    await music.play();
    console.log("Audio OK");
  } catch(e){
    console.log("Bloqueado:", e);
  }

  // lluvia corazones
  setInterval(()=>{
    let heart = document.createElement("div");
    heart.className = "heart-rain";
    heart.innerHTML = "💖";

    heart.style.left = Math.random()*100 + "vw";
    heart.style.fontSize = (Math.random()*20+15)+"px";
    heart.style.animationDuration = (Math.random()*3+2)+"s";

    document.body.appendChild(heart);
    setTimeout(()=>heart.remove(),5000);
  },120);
};

// BOTÓN MANUAL (SI FALLA AUTOPLAY)
playBtn.onclick = ()=>{
  music.play();
};
</script>

</body>
</html>
